<!DOCTYPE html>
<html>
  <head>
    <title>WebAR</title>
    <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
    <style>
      #loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 24px;
        color: white;
        background: rgba(0,0,0,0.5);
        padding: 10px 20px;
        border-radius: 10px;
        z-index: 9999;
      }
    </style>
  </head>

  <body style="margin:0; overflow:hidden; background:black;">
    <div id="loading">Loading 3D Model...</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false"
             loading-screen="enabled: false">

      <a-assets timeout="120000">
        <a-asset-item id="obj-d"
          src="https://github.com/takayama97/taka/releases/download/untagged-1acd87461f0e4104f24f/AR_yado.obj">
        </a-asset-item>

        <a-asset-item id="mtl-d"
          src="https://github.com/takayama97/taka/releases/download/untagged-1acd87461f0e4104f24f/AR_yado.mtl">
        </a-asset-item>
      </a-assets>

      <a-marker
        type="pattern"
        url="https://github.com/takayama97/taka/releases/download/untagged-1acd87461f0e4104f24f/pattern-yado.patt">

        <a-obj-model
          src="#obj-d"
          mtl="#mtl-d"
          rotation="-90 180 180"
          scale="0.1 0.1 0.1">
        </a-obj-model>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const assets = document.querySelector('a-assets');
      assets.addEventListener('loaded', () => {
        document.getElementById('loading').style.display = 'none';
      });
    </script>
  </body>
</html>
