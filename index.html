<!DOCTYPE html>
<html>
<head>
  <title>WebAR</title>
  <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  <style>
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      border-radius: 10px;
      z-index: 9999;
    }
  </style>
</head>

<body style="margin:0; overflow:hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false">

    <a-marker
      type="pattern"
      url="https://github.com/takayama97/taka/releases/download/untagged-1acd87461f0e4104f24f/pattern-yado.patt">

      <!-- a-assets を使わず、直接URL指定 -->
      <a-obj-model
        src="https://github.com/takayama97/taka/releases/download/untagged-1acd87461f0e4104f24f/AR_yado.obj"
        mtl="https://github.com/takayama97/taka/releases/download/untagged-1acd87461f0e4104f24f/AR_yado.mtl"
        rotation="-90 180 180"
        scale="0.1 0.1 0.1">
      </a-obj-model>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
