<!DOCTYPE html>
<html>
  <head>
    <title>WebAR Debug Test</title>
    <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin:0; overflow:hidden;">
    <!-- webcamを明示的に指定 -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: true">
  <a-assets>
    <a-asset-item id="obj-d" src="AR_yado.obj"></a-asset-item>
    <a-asset-item id="mtl-d" src="AR_yado.mtl"></a-asset-item>
  </a-assets>

  <a-marker type="pattern" url="pattern-yado.patt">
    <a-obj-model src="#obj-d" mtl="#mtl-d" rotation="-90 180 180" scale="0.1 0.1 0.1"></a-obj-model>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

  </body>
</html>
